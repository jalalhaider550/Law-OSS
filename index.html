<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Law OSS — Open Source Legal AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#fff;color:#0a0a0a;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
.btn-primary{background:#0a0a0a;color:#fff;border:none;border-radius:9px;padding:11px 24px;font-size:14px;font-weight:700;cursor:pointer}
.btn-primary:hover{background:#333}
.btn-ghost{background:transparent;color:#666;border:1.5px solid #e0e0e0;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer}
.btn-ghost:hover{border-color:#0a0a0a;color:#0a0a0a}
.field{width:100%;padding:10px 13px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;color:#0a0a0a;background:#fff}
.field:focus{outline:none;border-color:#0a0a0a}
.label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:5px}
@keyframes spin{0%,80%,100%{transform:scale(0.5);opacity:0.2}40%{transform:scale(1);opacity:1}}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#0a0a0a;margin:0 2px;animation:spin 1.1s ease-in-out infinite}
.dot2{animation-delay:.18s}.dot3{animation-delay:.36s}
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:56px;border-bottom:1px solid #e8e8e8;position:sticky;top:0;background:rgba(255,255,255,.97);z-index:100}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:'DM Serif Display',serif;font-size:17px}
.logo-icon{width:28px;height:28px;background:#0a0a0a;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;flex-shrink:0}
.hero{max-width:820px;margin:0 auto;padding:72px 32px 56px;text-align:center}
.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(34px,5vw,60px);font-weight:400;line-height:1.08;margin-bottom:18px;letter-spacing:-.02em}
.hero p{font-size:16px;color:#666;max-width:520px;margin:0 auto 28px;line-height:1.65}
.pricing{background:#f8f8f8;border-top:1px solid #e8e8e8;border-bottom:1px solid #e8e8e8;padding:28px 32px}
.pricing-grid{max-width:720px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;align-items:center}
.pricing-item{padding:20px 16px;text-align:center}
.pricing-hl{background:#0a0a0a;border-radius:10px;transform:scale(1.04);position:relative;padding:20px 16px;text-align:center}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.feat-card{padding:20px;border:1.5px solid #e4e4e4;border-radius:12px;cursor:default}
.feat-card:hover{border-color:#0a0a0a}
.testi-grid{max-width:920px;margin:20px auto 0;display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.testi-card{background:#fff;border:1.5px solid #ebebeb;border-radius:12px;padding:18px}
.err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:9px 13px;font-size:12.5px;color:#dc2626;margin-bottom:14px}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f7f7;padding:20px}
.auth-card{display:flex;background:#fff;border-radius:18px;box-shadow:0 16px 48px rgba(0,0,0,.1);overflow:hidden;width:100%;max-width:800px}
.auth-left{width:380px;background:#0a0a0a;color:#fff;padding:40px 36px;display:flex;flex-direction:column;flex-shrink:0}
.auth-right{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 36px}
.auth-form{width:100%;max-width:320px}
.form-group{margin-bottom:14px}
.apikey-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f7f7;padding:20px}
.apikey-box{background:#fff;border-radius:18px;box-shadow:0 16px 48px rgba(0,0,0,.1);padding:40px 36px;width:100%;max-width:460px}
.app-wrap{display:flex;min-height:100vh}
.sidebar{width:224px;background:#fafafa;border-right:1px solid #e8e8e8;display:flex;flex-direction:column;height:100vh;position:sticky;top:0;flex-shrink:0}
.nav-item{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:none;background:transparent;color:#888;font-size:13px;text-align:left;cursor:pointer;margin-bottom:2px}
.nav-item.active{background:#ebebeb;color:#0a0a0a;font-weight:600}
.main{flex:1;overflow-y:auto;background:#fff}
.view{padding:36px 44px;max-width:860px}
.project-card{display:flex;align-items:center;gap:14px;padding:16px 20px;background:#fff;border:1.5px solid #e4e4e4;border-radius:12px;margin-bottom:10px;cursor:pointer}
.project-card:hover{border-color:#0a0a0a}
.chat-wrap{display:flex;flex-direction:column;height:100vh;max-width:800px;width:100%}
.chat-header{padding:18px 36px 14px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.paste-panel{padding:14px 36px;border-bottom:1px solid #e8e8e8;background:#fffbeb;flex-shrink:0}
.messages{flex:1;overflow-y:auto;padding:18px 36px}
.msg-row{display:flex;gap:10px;margin-bottom:14px}
.msg-row.user{flex-direction:row-reverse}
.msg-av{width:27px;height:27px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.msg-bubble{max-width:78%;padding:10px 14px;border-radius:11px;font-size:13.5px;line-height:1.7;white-space:pre-wrap}
.chat-input-bar{padding:10px 36px 18px;border-top:1px solid #f0f0f0;flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.chat-ta{flex:1;padding:9px 13px;background:#f5f5f5;border:1.5px solid #e4e4e4;border-radius:9px;color:#0a0a0a;font-size:13.5px;resize:none;min-height:40px;max-height:110px}
.chat-ta:focus{outline:none;border-color:#0a0a0a}
.send-btn{padding:9px 16px;background:#0a0a0a;border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:700;flex-shrink:0}
.chips{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.chip{padding:6px 12px;background:#f5f5f5;border:1.5px solid #e4e4e4;border-radius:20px;cursor:pointer;color:#666;font-size:12px}
.chip:hover{border-color:#0a0a0a;color:#0a0a0a}
.contract-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:18px}
.contract-card{padding:12px 14px;background:#fff;border:1.5px solid #e8e8e8;border-radius:10px;cursor:pointer;text-align:left;width:100%}
.contract-card:hover{border-color:#0a0a0a;background:#fafafa}
.config-box{background:#fff;border:1.5px solid #e4e4e4;border-radius:14px;padding:24px}
.party-grid{display:grid;grid-template-columns:1fr 130px 1fr 130px;gap:10px;margin-bottom:14px}
.output-box{background:#fff;border:1.5px solid #e4e4e4;border-radius:14px;padding:22px}
.output-pre{background:#f8f8f8;border-radius:9px;padding:18px 20px;border:1px solid #eee;max-height:520px;overflow-y:auto;font-family:'Courier New',monospace;font-size:12px;line-height:1.85;white-space:pre-wrap;color:#333;margin-top:14px}
.workflow-card{background:#fff;border:1.5px solid #e4e4e4;border-radius:12px;padding:16px 18px;margin-bottom:10px}
.workflow-steps{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.step-pill{padding:3px 8px;border-radius:5px;font-size:11px;background:#f8f8f8;border:1px solid #e4e4e4;color:#bbb}
.step-pill.on{background:#f0f0f0;border-color:#0a0a0a;color:#0a0a0a;font-weight:600}
@media(max-width:640px){.auth-card{flex-direction:column}.auth-left{width:100%;padding:24px}.auth-right{padding:24px}.party-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script>
var S = {
  screen:'landing', authMode:'signup', authStep:'form',
  name:'', email:'', password:'', apiKey:'', showKey:false, authErr:'',
  user:null, view:'projects',
  messages:[], chatInput:'', chatLoading:false,
  docText:'', docName:'', showPaste:false, pasteInput:'',
  cStep:'browse', selCat:null, selType:null, jurIdx:0,
  p1:'', p2:'', p1t:'Company', p2t:'Company', cnotes:'',
  cOutput:'', cLoading:false, copied:false,
  wActive:null, wStepIdx:0, wOutput:'', wLoading:false
};

try {
var _sv = localStorage.getItem(‘lawoss_v3’);
if (_sv) { var _u = JSON.parse(_sv); if (_u && _u.apiKey) { S.user = _u; S.screen = ‘app’; } }
} catch(e) {}

function saveUser(u) { try { localStorage.setItem(‘lawoss_v3’, JSON.stringify(u)); } catch(e) {} }
function clearUser() { try { localStorage.removeItem(‘lawoss_v3’); } catch(e) {} }
function el(id) { return document.getElementById(id); }
function set(p) { for (var k in p) S[k] = p[k]; render(); }

var JURIS = [
{l:‘US New York’,v:‘New York, USA’,s:‘common law’},
{l:‘US California’,v:‘California, USA’,s:‘common law’},
{l:‘US Delaware’,v:‘Delaware, USA’,s:‘common law’},
{l:‘US Texas’,v:‘Texas, USA’,s:‘common law’},
{l:‘US Federal’,v:‘Federal, USA’,s:‘common law’},
{l:‘England and Wales’,v:‘England and Wales, UK’,s:‘common law’},
{l:‘UAE DIFC’,v:‘Dubai International Financial Centre, UAE’,s:‘common law’},
{l:‘Singapore’,v:‘Singapore’,s:‘common law’},
{l:‘Australia NSW’,v:‘New South Wales, Australia’,s:‘common law’},
{l:‘Ontario Canada’,v:‘Ontario, Canada’,s:‘common law’},
{l:‘India’,v:‘India’,s:‘common law’},
{l:‘Germany’,v:‘Germany’,s:‘civil law’},
{l:‘France’,v:‘France’,s:‘civil law’},
{l:‘Netherlands’,v:‘Netherlands’,s:‘civil law’}
];

var CATS = [
{label:‘Corporate’,icon:‘🏛’,types:[
{id:‘spa’,label:‘Share Purchase Agreement’,desc:‘Full acquisition of company shares’},
{id:‘shareholders’,label:‘Shareholders Agreement’,desc:‘Rights and obligations of shareholders’},
{id:‘jv’,label:‘Joint Venture Agreement’,desc:‘Co-venture between two entities’},
{id:‘loi’,label:‘Letter of Intent’,desc:‘Pre-contractual term sheet’}
]},
{label:‘Commercial’,icon:‘📋’,types:[
{id:‘nda’,label:‘Non-Disclosure Agreement’,desc:‘Mutual or one-way confidentiality’},
{id:‘msa’,label:‘Master Services Agreement’,desc:‘Ongoing services framework’},
{id:‘saas’,label:‘SaaS Agreement’,desc:‘Software-as-a-service terms’},
{id:‘consulting’,label:‘Consulting Agreement’,desc:‘Independent contractor engagement’}
]},
{label:‘Employment’,icon:‘👤’,types:[
{id:‘employment’,label:‘Employment Agreement’,desc:‘Full-time or part-time employment’},
{id:‘executive’,label:‘Executive Service Agreement’,desc:‘C-suite or director-level contract’},
{id:‘non_compete’,label:‘Non-Compete Agreement’,desc:‘Restrictive covenants post-employment’}
]},
{label:‘Finance’,icon:‘💰’,types:[
{id:‘safe’,label:‘SAFE Note’,desc:‘Simple Agreement for Future Equity’},
{id:‘convertible’,label:‘Convertible Note’,desc:‘Debt convertible to equity’},
{id:‘loan’,label:‘Loan Agreement’,desc:‘Commercial lending agreement’}
]}
];

var WFS = [
{id:1,name:‘Due Diligence Review’,steps:[‘Upload documents’,‘Extract clauses’,‘Flag risks’,‘Generate summary’]},
{id:2,name:‘Contract Comparison’,steps:[‘Upload base contract’,‘Upload comparison’,‘Identify differences’,‘Summarise’]},
{id:3,name:‘Compliance Audit’,steps:[‘Upload policy docs’,‘Check regulations’,‘Generate report’]}
];

var TESTIS = [
{avatar:‘SC’,name:‘Sarah Chen’,role:‘Solo Attorney, New York’,text:‘Finally a legal AI that does not cost $40K a year. Harvey who?’},
{avatar:‘MO’,name:“Marcus O’Brien”,role:“Partner, O’Brien & Associates”,text:‘Switched from Legora. Law OSS does the same work and I am saving $28K annually.’},
{avatar:‘PN’,name:‘Priya Nair’,role:‘In-House Counsel, FinTech’,text:‘The contract drafting is remarkable. 15 jurisdictions actually done properly.’},
{avatar:‘JW’,name:‘James Whitfield’,role:‘Criminal Defense, Chicago’,text:‘Open source means I can audit what it does with my client data. Harvey cannot say that.’},
{avatar:‘AO’,name:‘Amara Okafor’,role:‘IP Litigator, London’,text:‘England and Wales drafting is genuinely accurate. Not re-skinned US templates.’},
{avatar:‘DR’,name:‘Diego Reyes’,role:‘M&A Lawyer, Mexico City’,text:‘Civil law jurisdiction support is a genuine differentiator. Remarkable product.’}
];

function callAI(apiKey, system, messages, cb) {
fetch(‘https://api.anthropic.com/v1/messages’, {
method: ‘POST’,
headers: {
‘Content-Type’: ‘application/json’,
‘x-api-key’: apiKey,
‘anthropic-version’: ‘2023-06-01’,
‘anthropic-dangerous-direct-browser-access’: ‘true’
},
body: JSON.stringify({model:‘claude-sonnet-4-20250514’, max_tokens:1000, system:system, messages:messages})
})
.then(function(r) { return r.json(); })
.then(function(d) {
if (d.error) { cb(null, d.error.message || ‘API error’); return; }
var t = ‘’;
if (d.content) { for (var i = 0; i < d.content.length; i++) { if (d.content[i].text) t += d.content[i].text; } }
cb(t, null);
})
.catch(function(e) { cb(null, e.message || ‘Network error’); });
}

function render() {
var root = document.getElementById(‘root’);
if (!root) return;
if (S.screen === ‘landing’) { root.innerHTML = getLanding(); bindLanding(); }
else if (S.screen === ‘auth’) { root.innerHTML = getAuth(); bindAuth(); }
else if (S.screen === ‘apikey’) { root.innerHTML = getApikey(); bindApikey(); }
else if (S.screen === ‘app’) { root.innerHTML = getApp(); bindApp(); }
}

function getLanding() {
var feats = [
{icon:‘◎’,t:‘Document Chat’,d:‘Upload any legal document. Risk flagging, obligation mapping, clause extraction.’},
{icon:‘⟐’,t:‘Contract Studio’,d:‘30 contract types across 14 jurisdictions. Jurisdiction-aware drafting.’},
{icon:‘⌬’,t:‘Legal Workflows’,d:‘Multi-step due diligence, contract comparison, and compliance pipelines.’},
{icon:‘🔑’,t:‘Bring Your Own Key’,d:‘Connect your own Anthropic key. We never see your tokens.’},
{icon:‘🌍’,t:‘14 Jurisdictions’,d:‘US, UK, EU, APAC. Common law and civil law.’},
{icon:‘🔒’,t:‘Data Sovereignty’,d:‘Open source. Self-hostable. Attorney-client privilege preserved.’}
];
var fHTML = ‘’;
for (var i = 0; i < feats.length; i++) {
fHTML += ‘<div class="feat-card"><div style="font-size:22px;margin-bottom:10px">’+feats[i].icon+’</div><div style="font-size:14px;font-weight:700;margin-bottom:5px">’+feats[i].t+’</div><div style="font-size:13px;color:#666;line-height:1.6">’+feats[i].d+’</div></div>’;
}
var tHTML = ‘’;
for (var j = 0; j < TESTIS.length; j++) {
var t = TESTIS[j];
tHTML += ‘<div class="testi-card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div style="width:34px;height:34px;border-radius:50%;background:#0a0a0a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">’+t.avatar+’</div><div><div style="font-size:13px;font-weight:700">’+t.name+’</div><div style="font-size:11px;color:#888">’+t.role+’</div></div></div><div style="font-size:13px;color:#444;line-height:1.65;font-style:italic">”’+t.text+’”</div></div>’;
}
return ‘<nav class="nav"><div class="nav-logo"><div class="logo-icon">⚖</div>Law OSS</div><div style="display:flex;gap:10px;align-items:center"><button class="btn-ghost" id="nl">Log in</button><button class="btn-primary" id="ns" style="padding:8px 16px;font-size:13px">Get started free</button></div></nav>’
+’<div class="hero"><div style="display:inline-flex;align-items:center;gap:8px;background:#f4f4f4;border:1px solid #e8e8e8;border-radius:24px;padding:5px 14px 5px 8px;margin-bottom:22px;font-size:12.5px;color:#555"><span style="background:#0a0a0a;color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:12px;letter-spacing:.07em">OPEN SOURCE</span>Free alternative to Harvey AI & Legora</div><h1>Enterprise legal AI.<br><em style="color:#555;font-style:italic">Without the enterprise bill.</em></h1><p>Harvey charges $40,000/yr. Legora charges $30,000/yr. Law OSS is free, open source, and runs on your own API key.</p><button class="btn-primary" id="hcta" style="padding:12px 26px;font-size:15px">Start for free →</button><div style="font-size:12px;color:#aaa;margin-top:12px">No credit card · No subscription · Bring your own API key</div></div>’
+’<div class="pricing"><div class="pricing-grid"><div class="pricing-item"><div style="font-size:12px;font-weight:600;margin-bottom:4px">Harvey AI</div><div style="font-family:\'DM Serif Display\',serif;font-size:26px;color:#dc2626;margin-bottom:4px">~$40,000/yr</div><div style="font-size:11px;color:#aaa">Closed source</div></div><div class="pricing-item"><div style="font-size:12px;font-weight:600;margin-bottom:4px">Legora</div><div style="font-family:\'DM Serif Display\',serif;font-size:26px;color:#dc2626;margin-bottom:4px">~$30,000/yr</div><div style="font-size:11px;color:#aaa">Per-seat pricing</div></div><div class="pricing-hl"><div style="position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;font-size:9px;font-weight:700;padding:3px 9px;border-radius:12px;white-space:nowrap">YOUR CHOICE</div><div style="font-size:12px;font-weight:600;color:#aaa;margin-bottom:4px">Law OSS</div><div style="font-family:\'DM Serif Display\',serif;font-size:26px;color:#fff;margin-bottom:4px">Free forever</div><div style="font-size:11px;color:rgba(255,255,255,.5)">Open source · BYOK</div></div></div></div>’
+’<div style="max-width:900px;margin:0 auto;padding:56px 32px"><h2 style="font-family:\'DM Serif Display\',serif;font-size:30px;font-weight:400;text-align:center;margin-bottom:8px">Everything Harvey has. Nothing they charge for.</h2><div style="text-align:center;color:#777;margin-bottom:36px;font-size:14px">Full feature parity. Zero licensing cost.</div><div class="feat-grid">’+fHTML+’</div></div>’
+’<div style="background:#f8f8f8;border-top:1px solid #e8e8e8;padding:56px 32px"><h2 style="font-family:\'DM Serif Display\',serif;font-size:30px;font-weight:400;text-align:center;margin-bottom:4px">Lawyers who made the switch</h2><div style="text-align:center;color:#777;font-size:14px">From Harvey and Legora to free</div><div class="testi-grid">’+tHTML+’</div></div>’
+’<div style="max-width:560px;margin:0 auto;padding:56px 32px;text-align:center"><div style="background:#0a0a0a;border-radius:18px;padding:44px 36px"><h2 style="font-family:\'DM Serif Display\',serif;font-size:30px;color:#fff;font-weight:400;margin-bottom:10px">Ready to cancel Harvey?</h2><p style="color:#888;font-size:14px;margin-bottom:22px;line-height:1.6">Connect your Anthropic API key and you're up in under two minutes.</p><button class="btn-primary" id="ccta" style="background:#fff;color:#0a0a0a;padding:12px 26px;font-size:15px">Get started free →</button></div></div>’
+’<footer style="border-top:1px solid #e8e8e8;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#aaa;flex-wrap:wrap;gap:8px"><div style="display:flex;align-items:center;gap:7px"><div style="width:20px;height:20px;background:#0a0a0a;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px">⚖</div><span style="font-family:\'DM Serif Display\',serif;font-size:14px;color:#0a0a0a">Law OSS</span></div><span>Open source · AGPL-3.0 · Not legal advice</span></footer>’;
}

function bindLanding() {
var toAuth = function() { set({screen:‘auth’,authMode:‘signup’,authStep:‘form’,authErr:’’}); };
if (el(‘nl’)) el(‘nl’).onclick = function() { set({screen:‘auth’,authMode:‘login’,authStep:‘form’,authErr:’’}); };
if (el(‘ns’)) el(‘ns’).onclick = toAuth;
if (el(‘hcta’)) el(‘hcta’).onclick = toAuth;
if (el(‘ccta’)) el(‘ccta’).onclick = toAuth;
}

function getAuth() {
var isL = S.authMode === ‘login’;

body = ‘<div class="output-box" style="text-align:center;padding:44px"><div style="font-size:14px;color:#666;margin-bottom:14px">Drafting your ‘+(S.selType?escH(S.selType.label):‘contract’)+’…</div><span class="dot"></span><span class="dot dot2"></span><span class="dot dot3"></span></div>’;
} else {
body = ‘<div class="output-box"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px"><div><div style="font-size:13px;font-weight:700;margin-bottom:3px">’+(S.selType?escH(S.selType.label):’’)+’</div><div style="font-size:11.5px;color:#888">’+(JURIS[S.jurIdx]?escH(JURIS[S.jurIdx].l):’’)+’ · ‘+escH(S.p1)+’ / ‘+escH(S.p2)+’</div></div><button class="btn-ghost" id="ccopy" style="padding:6px 13px;font-size:12px">’+(S.copied?‘Copied ✓’:‘Copy’)+’</button></div><div class="output-pre">’+escH(S.cOutput)+’</div></div>’;
}
}
return ‘<div class="view" style="max-width:920px"><div style="display:flex;align-items:center;gap:14px;margin-bottom:5px"><h1 style="font-size:24px;font-weight:800;letter-spacing:-.03em">Contract Studio</h1>’+back+’</div><p style="color:#888;font-size:13px;margin-bottom:20px">30 contract types · 14 jurisdictions · jurisdiction-aware drafting</p>’+body+’</div>’;
}

function makeEntOpts(sel) {
var opts = [‘Company’,‘Individual’,‘LLP’,‘Partnership’,‘Trust’];
var h = ‘’;
for (var i = 0; i < opts.length; i++) h += ‘<option’+(opts[i]===sel?’ selected’:’’)+’>’+opts[i]+’</option>’;
return h;
}

function bindContracts() {
if (el(‘cbk’)) el(‘cbk’).onclick = function() { set({cStep:‘browse’,cOutput:’’}); };
var cards = document.querySelectorAll(’.contract-card’);
for (var i = 0; i < cards.length; i++) {
cards[i].onclick = (function(ci, ti) {
return function() {
set({cStep:‘configure’, selCat:CATS[ci], selType:CATS[ci].types[ti], cOutput:’’});
};
})(parseInt(cards[i].dataset.ci), parseInt(cards[i].dataset.ti));
}
if (el(‘cjs’)) el(‘cjs’).onchange = function() { S.jurIdx = parseInt(this.value); };
if (el(‘cp1’)) el(‘cp1’).oninput = function() { S.p1 = this.value; };
if (el(‘cp2’)) el(‘cp2’).oninput = function() { S.p2 = this.value; };
if (el(‘cp1t’)) el(‘cp1t’).onchange = function() { S.p1t = this.value; };
if (el(‘cp2t’)) el(‘cp2t’).onchange = function() { S.p2t = this.value; };
if (el(‘cno’)) el(‘cno’).oninput = function() { S.cnotes = this.value; };
if (el(‘cgen’)) el(‘cgen’).onclick = function() {
if (el(‘cp1’)) S.p1 = el(‘cp1’).value;
if (el(‘cp2’)) S.p2 = el(‘cp2’).value;
if (el(‘cjs’)) S.jurIdx = parseInt(el(‘cjs’).value);
if (el(‘cno’)) S.cnotes = el(‘cno’).value;
if (!S.p1.trim() || !S.p2.trim()) { alert(‘Please fill in both party names.’); return; }
S.cStep = ‘output’; S.cLoading = true; S.cOutput = ‘’;
render();
var jur = JURIS[S.jurIdx];
var jCtx = jur.s===‘civil law’ ? ‘Use civil law conventions, statutory codes, avoid common law constructs.’ : ‘Use standard common law drafting conventions.’;
var sys = ‘You are a senior commercial lawyer specialising in ‘+jur.v+’ law. ‘+jCtx+’ Draft professional, numbered, jurisdiction-specific contracts with all essential clauses and a complete execution block.’;
var umsg = ‘Draft a ‘+(S.selType?S.selType.label:’’)+’ under ‘+jur.v+’ law.\nParty A: ‘+S.p1+’ (’+S.p1t+’)\nParty B: ‘+S.p2+’ (’+S.p2t+’)\n’+(S.cnotes?‘Instructions: ‘+S.cnotes:’’)+’\nInclude all standard provisions and a full signature block.’;
callAI(S.user.apiKey, sys, [{role:‘user’,content:umsg}], function(text, err) {
S.cLoading = false; S.cOutput = err ? ’Error: ’+err : text; render();
});
};
if (el(‘ccopy’)) el(‘ccopy’).onclick = function() {
navigator.clipboard.writeText(S.cOutput);
set({copied:true});
setTimeout(function() { set({copied:false}); }, 2000);
};
}

function getWorkflows() {
var html = ‘<div class="view"><h1 style="font-size:24px;font-weight:800;margin-bottom:5px;letter-spacing:-.03em">Workflows</h1><p style="color:#666;font-size:13.5px;margin-bottom:22px">Multi-step legal automation pipelines</p>’;
for (var i = 0; i < WFS.length; i++) {
var w = WFS[i];
var isA = S.wActive && S.wActive.id === w.id;
var stepsH = ‘’;
for (var j = 0; j < w.steps.length; j++) {
var on = isA && j <= S.wStepIdx && S.wLoading;
stepsH += ‘<div class="step-pill'+(on?' on':'')+'">’+( j+1)+’. ‘+w.steps[j]+’</div>’;
}
var btnL = isA && S.wLoading ? ‘Running…’ : ‘Run’;
html += ‘<div class="workflow-card'+(isA?' active-w':'')+'"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:14px;font-weight:700;margin-bottom:2px">’+escH(w.name)+’</div><div style="font-size:12px;color:#888">’+w.steps.length+’ steps</div></div><button class="btn-primary" data-wid="'+w.id+'" style="padding:7px 16px;font-size:12px;opacity:'+(S.wLoading&&!isA?0.4:1)+'">’+btnL+’</button></div><div class="workflow-steps">’+stepsH+’</div></div>’;
}
if (S.wOutput && !S.wLoading) {
html += ‘<div class="output-box" style="margin-top:14px"><div style="font-size:12px;font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em">Output: ‘+(S.wActive?escH(S.wActive.name):’’)+’</div><div style="font-size:13.5px;line-height:1.75;white-space:pre-wrap;color:#0a0a0a">’+escH(S.wOutput)+’</div></div>’;
}
return html + ‘</div>’;
}

function bindWorkflows() {
var btns = document.querySelectorAll(’[data-wid]’);
for (var i = 0; i < btns.length; i++) {
btns[i].onclick = (function(wid) {
return function() {
if (S.wLoading) return;
var w = null;
for (var j = 0; j < WFS.length; j++) { if (WFS[j].id === wid) { w = WFS[j]; break; } }
if (!w) return;
S.wActive = w; S.wStepIdx = 0; S.wOutput = ‘’; S.wLoading = true;
render();
var step = 0;
function tick() {
if (step < w.steps.length) {
S.wStepIdx = step; step++;
render();
setTimeout(tick, 700);
} else {
callAI(S.user.apiKey, ‘You are a legal AI assistant in Law OSS.’, [{role:‘user’,content:‘You ran the “’+w.name+’” legal workflow. Provide a detailed structured output report with findings, key points, risks, and recommendations.’}], function(text, err) {
S.wOutput = err ? ’Error: ’+err : text; S.wLoading = false; render();
});
}
}
setTimeout(tick, 700);
};
})(parseInt(btns[i].dataset.wid));
}
}

function escH(s) {
if (!s) return ‘’;
return String(s).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’);
}

document.addEventListener(‘DOMContentLoaded’, function() { render(); });
</script>

</body>
</html>
