[build]
builder = "nixpacks"
buildCommand = "npm install && npx tsc -p vendor/types/tsconfig.json && npx tsc -p vendor/ai/tsconfig.json && npx prisma generate --schema=vendor/db/prisma/schema.prisma && npx tsc -p vendor/db/tsconfig.json && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
