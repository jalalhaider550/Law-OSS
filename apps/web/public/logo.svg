  <!-- Left pan -->
  <ellipse cx="14.75" cy="25" rx="5" ry="1.5" fill="white"/>
  <!-- Right pan -->
  <ellipse cx="33.25" cy="25" rx="5" ry="1.5" fill="white"/>
  <!-- Base -->
