function h(tag,attrs,children){
const el=document.createElement(tag);
for(const[k,v]of Object.entries(attrs||{})){
if(k===“class”)el.className=v;
else if(k.startsWith(“on”))el.addEventListener(k.slice(2).toLowerCase(),v);
else if(k===“style”&&typeof v===“object”)Object.assign(el.style,v);
else el.setAttribute(k,v);
}
for(const c of[].concat(children||[])){
if(c==null||c===false)continue;
el.appendChild(typeof c===“string”?document.createTextNode(c):c);
}
return el;
}

async function callAI(apiKey,system,messages){
const r=await fetch(“https://api.anthropic.com/v1/messages”,{
method:“POST”,
headers:{“Content-Type”:“application/json”,“x-api-key”:apiKey,“anthropic-version”:“2023-06-01”,“anthropic-dangerous-direct-browser-access”:“true”},
body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:1000,system,messages}),
});
if(!r.ok)throw new Error(“HTTP “+r.status);
const d=await r.json();
if(d.error)throw new Error(d.error.message||“API error”);
return d.content?.map(c=>c.text||””).join(””)||””;
}

}catch(e){
S.messages=[…S.messages,{role:“assistant”,text:“Error: “+e.message}];

}

// ── Workflows view ───────────────────────────────────────────────────────────
function workflowsView(){
const v=h(“div”,{style:{padding:“40px 48px”,maxWidth:“840px”}});
v.appendChild(h(“h1”,{style:{fontSize:“24px”,fontWeight:“800”,color:”#0a0a0a”,marginBottom:“5px”,letterSpacing:”-.03em”}},“Workflows”));
v.appendChild(h(“p”,{style:{fontSize:“13.5px”,color:”#666”,marginBottom:“24px”}},“Multi-step legal automation pipelines”));
const grid=h(“div”,{style:{display:“grid”,gap:“12px”,marginBottom:“22px”}});
WORKFLOWS.forEach(w=>{
const c=h(“div”,{style:{background:”#fff”,border:“1.5px solid “+(S.wActive?.id===w.id?”#0a0a0a”:”#e4e4e4”),borderRadius:“12px”,padding:“18px 20px”,transition:“border-color .2s”}});
const top=h(“div”,{style:{display:“flex”,justifyContent:“space-between”,alignItems:“flex-start”,marginBottom:“12px”}});
const info=h(“div”,{});
info.appendChild(h(“div”,{style:{fontSize:“14px”,fontWeight:“700”,color:”#0a0a0a”,marginBottom:“2px”}},[w.name]));
info.appendChild(h(“div”,{style:{fontSize:“12px”,color:”#888”}},[w.steps.length+” steps”]));
top.appendChild(info);
const runBtn=btn(S.wActive?.id===w.id&&S.wLoading?“Running…”:“Run”,async()=>{
if(S.wLoading)return;
set({wActive:w,wStepIdx:0,wOutput:””,wLoading:true});
for(let i=0;i<w.steps.length;i++){S.wStepIdx=i;render();await new Promise(r=>setTimeout(r,700));}
try{
const text=await callAI(S.user.apiKey,“You are a legal AI assistant in Law OSS.”,[{role:“user”,content:`You ran the "${w.name}" legal workflow. Provide a detailed structured output report with findings, key points, risks, and recommendations.`}]);
set({wOutput:text,wLoading:false});
}catch(e){set({wOutput:“Error: “+e.message,wLoading:false});}
},{style:{padding:“7px 16px”,fontSize:“12px”,opacity:S.wLoading&&S.wActive?.id!==w.id?“0.4”:“1”}});
top.appendChild(runBtn);
c.appendChild(top);
const steps=h(“div”,{style:{display:“flex”,gap:“6px”,flexWrap:“wrap”}});
w.steps.forEach((s,i)=>{
const active=S.wActive?.id===w.id&&i<=S.wStepIdx&&S.wLoading;
const sp=h(“div”,{style:{padding:“3px 9px”,borderRadius:“5px”,fontSize:“11.5px”,background:active?”#f0f0f0”:”#f8f8f8”,border:“1px solid “+(active?”#0a0a0a”:”#e4e4e4”),color:active?”#0a0a0a”:”#bbb”,fontWeight:active?“600”:“400”,transition:“all .3s”}},[String(i+1)+”. “+s]);
steps.appendChild(sp);
});
c.appendChild(steps);
grid.appendChild(c);
});
v.appendChild(grid);
if(S.wOutput&&!S.wLoading){
const out=h(“div”,{style:{background:”#fff”,border:“1.5px solid #e4e4e4”,borderRadius:“12px”,padding:“24px”}});
out.appendChild(h(“div”,{style:{fontSize:“12px”,fontWeight:“700”,color:”#0a0a0a”,marginBottom:“12px”,textTransform:“uppercase”,letterSpacing:”.06em”}},“Output: “+S.wActive?.name));
const p=h(“div”,{style:{color:”#0a0a0a”,fontSize:“13.5px”,lineHeight:“1.75”,whiteSpace:“pre-wrap”}});
p.textContent=S.wOutput;
out.appendChild(p);
v.appendChild(out);
}
return v;
}
